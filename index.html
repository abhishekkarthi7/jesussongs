<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jesus Songs | Telugu Christian Lyric Library</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="A premium library of Jesus Telugu songs. Search and read your favorite Christian lyrics in Telugu script or English transliteration.">
  <meta name="keywords" content="Jesus Songs, Telugu Christian Lyrics, Christian Songs Telugu, Jesus Songs Abhishek">
  <meta name="author" content="Abhishek">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2965/2965318.png">

  <!-- Font Awesome for Premium Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background overlay with a very subtle top golden glow -->
  <div class="luxury-bg-overlay"></div>

  <!-- Header Navigation (SBR Style Logo & Centered Nav) -->
  <header id="main-header">
    <div class="nav-container-centered">
      <div class="logo-centered">
        <span class="logo-main-centered">JESUS SONGS</span>
        <span class="logo-sub-centered">made by Abhishek</span>
      </div>
      
      <!-- Navigation Tabs (Telugu & English Views) -->
      <ul class="nav-links-centered" id="viewTabs">
        <li><a href="#" class="nav-link active" data-view="telugu" id="tabTelugu">TELUGU</a></li>
        <li><a href="#" class="nav-link" data-view="english" id="tabEnglish">ENGLISH</a></li>
      </ul>
    </div>
  </header>

  <div class="app-container">
    <main>
      <!-- Adaptive Search Box Section -->
      <section class="search-wrapper">
        <div class="search-bar-container">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
          <input type="text" id="searchInput" class="search-input" placeholder="Search for Telugu Jesus songs..." aria-label="Search Songs">
          <button id="clearSearchBtn" class="clear-search-btn" style="display: none;" title="Clear Search">
            <i class="fa-solid fa-xmark"></i>
          </button>
          <button id="searchTriggerBtn" class="search-button">Search</button>
        </div>
      </section>

      <!-- Category Filter Pills -->
      <section class="filters-container" id="filtersContainer" aria-label="Filter Categories">
        <button class="filter-badge active" data-category="all">All Songs</button>
        <button class="filter-badge" data-category="ఆరాధన (Worship)">Worship</button>
        <button class="filter-badge" data-category="స్తుతి (Praise)">Praise</button>
        <button class="filter-badge" data-category="కృతజ్ఞత (Thanksgiving)">Thanksgiving</button>
        <button class="filter-badge" data-category="ప్రేమ (Love)">Love of God</button>
        <button class="filter-badge" data-category="సమర్పణ (Dedication)">Dedication</button>
        <button class="filter-badge" data-category="సిలువ ధ్యానాలు (Lent)">Lent Specials</button>
      </section>

      <!-- Dynamic Cards Grid -->
      <section class="songs-grid" id="songsGrid" aria-live="polite">
        <!-- Rendered dynamically by app.js -->
      </section>

      <!-- Add Song Action Center -->
      <div class="action-footer">
        <button id="addSongBtn" class="btn-add-song">
          <i class="fa-solid fa-plus"></i> Add New Song
        </button>
      </div>
    </main>

    <!-- Footer with Average-sized Rectangle Developer Card -->
    <footer class="app-footer">
      <div class="developer-rect-card">
        <div class="rect-left">
          <span class="rect-logo-main">JESUS SONGS</span>
          <span class="rect-logo-sub">made by Abhishek</span>
        </div>
        <div class="rect-divider"></div>
        <div class="rect-right">
          <a href="https://abhishek-portfolio.example.com" target="_blank" class="portfolio-btn" id="portfolioLink">
            Visit Portfolio <i class="fa-solid fa-arrow-up-right-from-square"></i>
          </a>
        </div>
      </div>
      <p class="footer-copyright">Jesus Songs Library © 2026. All rights devoted.</p>
    </footer>
  </div>

  <!-- Interactive Lyric Viewer Modal (Slides from Right) -->
  <div class="modal-overlay" id="lyricModal" aria-hidden="true">
    <div class="modal-content" role="dialog" aria-labelledby="modalTitle">
      
      <!-- Modal Header -->
      <div class="modal-header">
        <div class="modal-header-info">
          <div class="modal-title-telugu" id="modalTitleTelugu">యెహోవా నా కాపరి</div>
          <div class="modal-title-english" id="modalTitleEnglish">Yehova Na Kaapari</div>
        </div>
        <button class="close-modal-btn" id="closeModalBtn" aria-label="Close Lyrics View" title="Close Panel">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <!-- Modal Action Toolbar -->
      <div class="modal-toolbar">
        <div class="toolbar-group">
          <span class="toolbar-label">Actions:</span>
          <button class="btn-tool btn-tool-text" id="copyLyricsBtn" title="Copy Lyrics">
            <i class="fa-solid fa-copy"></i> Copy
          </button>
          <button class="btn-tool btn-tool-text" id="printLyricsBtn" title="Print Lyrics">
            <i class="fa-solid fa-print"></i> Print
          </button>
        </div>
        <div class="toolbar-group">
          <span class="toolbar-label">Text Size:</span>
          <button class="btn-tool" id="zoomOutBtn" title="Decrease Font Size" aria-label="Decrease Font Size">A-</button>
          <button class="btn-tool" id="zoomNormalBtn" title="Reset Font Size" aria-label="Reset Font Size"><i class="fa-solid fa-rotate-left"></i></button>
          <button class="btn-tool" id="zoomInBtn" title="Increase Font Size" aria-label="Increase Font Size">A+</button>
        </div>
      </div>

      <!-- Lyrics Display Scroll Box -->
      <div class="lyrics-body-container">
        <div class="lyrics-display" id="lyricsDisplay">
          <!-- Lyrics placed dynamically -->
        </div>
      </div>

    </div>
  </div>

  <!-- Contributor Form Modal (Add Song) -->
  <div class="form-modal-overlay" id="addSongModal" aria-hidden="true">
    <div class="form-modal-content" role="dialog" aria-labelledby="formTitle">
      
      <div class="form-modal-header">
        <div class="form-modal-title" id="formTitle">Add New Song</div>
        <button class="close-modal-btn" id="closeFormBtn" aria-label="Close Form" title="Close Form">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <form id="addSongForm" class="form-body" onsubmit="return false;">
        <div class="form-group">
          <label for="inputTitleTelugu" class="form-label">Song Title (Telugu Script) *</label>
          <input type="text" id="inputTitleTelugu" class="form-control" placeholder="e.g., యెహోవా నా కాపరి" required>
        </div>

        <div class="form-group">
          <label for="inputTitleEnglish" class="form-label">Song Title (English Transliteration) *</label>
          <input type="text" id="inputTitleEnglish" class="form-control" placeholder="e.g., Yehova Na Kaapari" required>
        </div>

        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div>
            <label for="selectCategory" class="form-label">Category *</label>
            <select id="selectCategory" class="form-control" required>
              <option value="ఆరాధన (Worship)">ఆరాధన (Worship)</option>
              <option value="స్తుతి (Praise)">స్తుతి (Praise)</option>
              <option value="కృతజ్ఞత (Thanksgiving)">కృతజ్ఞత (Thanksgiving)</option>
              <option value="ప్రేమ (Love)">ప్రేమ (Love)</option>
              <option value="సమర్పణ (Dedication)">సమర్పణ (Dedication)</option>
              <option value="సిలువ ధ్యానాలు (Lent)">సిలువ ధ్యానాలు (Lent)</option>
            </select>
          </div>
          <div>
            <label for="inputArtist" class="form-label">Singer / Writer</label>
            <input type="text" id="inputArtist" class="form-control" placeholder="e.g., Yeshanna, Traditional">
          </div>
        </div>

        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div>
            <label for="inputKey" class="form-label">Musical Scale / Key</label>
            <input type="text" id="inputKey" class="form-control" placeholder="e.g., F Major">
          </div>
          <div>
            <label for="inputTempo" class="form-label">Tempo (BPM)</label>
            <input type="text" id="inputTempo" class="form-control" placeholder="e.g., 75 BPM">
          </div>
        </div>

        <div class="form-group">
          <label for="textareaLyrics" class="form-label">Lyrics (Telugu Script) *</label>
          <textarea id="textareaLyrics" class="form-control" placeholder="Paste the Telugu lyrics here..." required></textarea>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-cancel" id="cancelFormBtn">Cancel</button>
          <button type="submit" class="btn-save" id="saveSongBtn">Save Song</button>
        </div>
      </form>

    </div>
  </div>

  <!-- JavaScript Modules -->
  <script src="songs.js"></script>
  <script src="app.js"></script>
</body>
</html>
